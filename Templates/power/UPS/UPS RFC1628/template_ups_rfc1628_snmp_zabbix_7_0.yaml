        name: 'UPS: Battery is depleted'
        opdata: 'Battery status: {ITEM.LASTVALUE1}'
        priority: DISASTER
        tags:
        - tag: scope
          value: availability
      - uuid: 1ef22a1ab4094b8da9004ffa4c2bb1db
        expression: last(/Template UPS RFC1628 SNMP/ups.battery.status)=3
        name: 'UPS: Battery is low'
        opdata: 'Battery status: {ITEM.LASTVALUE1}'
        priority: HIGH
        tags:
        - tag: scope
          value: capacity
      - uuid: a0317c328bc548f184789b33c523d6fc
        expression: last(/Template UPS RFC1628 SNMP/ups.battery.status)=1
        name: 'UPS: Battery status is unknown'
        opdata: 'Battery status: {ITEM.LASTVALUE1}'
        priority: WARNING
        tags:
        - tag: scope
          value: availability
    - uuid: b4669c46dab0457f9dc9bf2c6f98a707
