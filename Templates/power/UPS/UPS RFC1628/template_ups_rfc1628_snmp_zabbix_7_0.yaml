      - uuid: 2632f0c510b245c89202ec4d74917ed7
        expression: last(/Template UPS RFC1628 SNMP/ups.battery.charge_pct)<{$UPS.BATTERY.CHARGE.WARN}
        name: 'UPS: Battery charge is low'
        opdata: 'Charge: {ITEM.LASTVALUE1}'
        priority: WARNING
        tags:
