zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: f7a1670c06af4019a3ee794c7a5ce780
    name: Templates/Power
  templates:
  - uuid: 5050f67abedc4eac9fa3440ae0d4d1d9
    template: Template UPS RFC1628 SNMP
    name: Template UPS RFC1628 SNMP
    description: RFC1628 UPS-MIB (1.3.6.1.2.1.33) based SNMP template for Zabbix 7.0. Includes identification, battery, input/output/bypass lines, active alarms,
      diagnostics and configuration/capacity metrics. Read-write MIB objects are polled read-only by Zabbix SNMP GET items; no SNMP SET operations are used.
    vendor:
      name: Custom
      version: 7.0-1
    groups:
    - name: Templates/Power
    items:
    - uuid: 1eef48efb91a4a579353d7feee75c63a
      name: SNMP agent availability
      type: INTERNAL
      key: zabbix[host,snmp,available]
      delay: 1m
      history: 7d
      trends: '0'
      value_type: UNSIGNED
      valuemap:
        name: SNMP availability
      tags:
      - tag: component
        value: availability
      triggers:
      - uuid: 91b7dfc1b7a540e0abb217a47e995dca
        expression: max(/Template UPS RFC1628 SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0
        name: 'UPS: SNMP agent is unavailable'
        opdata: 'SNMP availability: {ITEM.LASTVALUE1}'
        priority: HIGH
        tags:
        - tag: scope
          value: availability
    - uuid: 58a7f3c467a24431a8edfdae9a511a3b
      name: 'UPS: Manufacturer'
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.2.1.33.1.1.1.0
      key: ups.ident.manufacturer
      delay: 1h
      history: 30d
      value_type: CHAR
      description: RFC1628 UPS-MIB identification object.
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: component
        value: inventory
    - uuid: ebf83c6769a34419bc075cfa2a030c47
      name: 'UPS: Model'
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.2.1.33.1.1.2.0
