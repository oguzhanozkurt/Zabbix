    - uuid: 08cbaec2fcda44bf82a517353587ab6c
      name: UPS alarm table discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#UPS_ALARM_DESCR},.1.3.6.1.2.1.33.1.6.2.1.2]
      key: ups.alarm.discovery
      delay: 1h
      lifetime: 1h
      description: Discovers currently active UPS alarm rows. Main trigger is based on upsAlarmsPresent to avoid stale per-alarm problems after alarm rows disappear.
      item_prototypes:
      - uuid: 53379c28f6d4405e81ca2fda704b3176
        name: 'UPS alarm {#SNMPINDEX}: Description'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.2.1.33.1.6.2.1.2.{#SNMPINDEX}
        key: ups.alarm.descr[{#SNMPINDEX}]
        delay: 1m
        history: 90d
        value_type: CHAR
        tags:
        - tag: component
          value: alarm
      - uuid: 94339587363a4eb2915e047194bfc4ce
        name: 'UPS alarm {#SNMPINDEX}: Time'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.2.1.33.1.6.2.1.3.{#SNMPINDEX}
        key: ups.alarm.time[{#SNMPINDEX}]
        delay: 1m
        history: 90d
        trends: 365d
        value_type: FLOAT
        units: uptime
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '0.01'
        tags:
        - tag: component
          value: alarm
    tags:
    - tag: class
      value: power
    - tag: target
      value: ups
    macros:
    - macro: '{$SNMP.TIMEOUT}'
      value: 5m
      description: Time after which SNMP availability is considered unavailable.
    - macro: '{$UPS.ALARMS.MAX}'
      value: '0'
      description: Maximum acceptable number of active UPS alarms.
    - macro: '{$UPS.BATTERY.CHARGE.WARN}'
      value: '30'
      description: Warning threshold for battery charge percentage.
    - macro: '{$UPS.BATTERY.CHARGE.CRIT}'
      value: '15'
      description: Critical threshold for battery charge percentage.
    - macro: '{$UPS.BATTERY.RUNTIME.MIN.WARN}'
      value: '10'
      description: Warning threshold for estimated runtime in minutes.
    - macro: '{$UPS.BATTERY.RUNTIME.MIN.CRIT}'
      value: '5'
      description: Critical threshold for estimated runtime in minutes.
    - macro: '{$UPS.BATTERY.TEMP.WARN}'
      value: '40'
      description: Warning threshold for battery temperature in Celsius.
    - macro: '{$UPS.BATTERY.TEMP.CRIT}'
      value: '50'
      description: Critical threshold for battery temperature in Celsius.
    - macro: '{$UPS.OUTPUT.LOAD.WARN}'
      value: '80'
      description: Warning threshold for output load percentage.
    - macro: '{$UPS.OUTPUT.LOAD.CRIT}'
      value: '95'
      description: Critical threshold for output load percentage.
