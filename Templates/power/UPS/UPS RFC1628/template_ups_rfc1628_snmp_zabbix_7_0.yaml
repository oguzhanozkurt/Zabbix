    - uuid: 89851473bb484441946dbfdfbb200229
      name: 'UPS: Battery status'
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.2.1.33.1.2.1.0
      key: ups.battery.status
      delay: 1m
      history: 90d
      trends: 365d
      value_type: UNSIGNED
      valuemap:
        name: UPS battery status
      tags:
      - tag: component
        value: battery
      triggers:
      - uuid: 8f9e1f0cb6f840ce9d6055a77ba0e061
