      delay: 1h
      history: 30d
      value_type: CHAR
      description: RFC1628 UPS-MIB identification object.
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: component
        value: inventory
    - uuid: b2811332b9e94860a29c8f33e44f4a9d
