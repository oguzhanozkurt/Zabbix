      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.2.1.33.1.2.2.0
      key: ups.battery.seconds_on_battery
      delay: 1m
      history: 90d
      trends: 365d
      value_type: UNSIGNED
      units: s
      tags:
      - tag: component
        value: battery
      triggers:
      - uuid: c265962207bd4759b75da4e045ed0530
        expression: last(/Template UPS RFC1628 SNMP/ups.battery.seconds_on_battery)>0
        name: 'UPS: Running on battery power'
        opdata: 'Seconds on battery: {ITEM.LASTVALUE1}'
        priority: HIGH
        tags:
        - tag: scope
          value: availability
    - uuid: f522ea3dc4c94ed1b7fcf42e6fa2511b
      name: 'UPS: Estimated runtime'
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.2.1.33.1.2.3.0
      key: ups.battery.runtime.min
      delay: 1m
      history: 90d
      trends: 365d
      value_type: UNSIGNED
      units: min
      tags:
      - tag: component
        value: battery
      triggers:
      - uuid: 0370eccfeef24cd7a8f25925ef704c67
        expression: last(/Template UPS RFC1628 SNMP/ups.battery.runtime.min)<{$UPS.BATTERY.RUNTIME.MIN.CRIT} and last(/Template UPS RFC1628 SNMP/ups.battery.runtime.min)>0
        name: 'UPS: Estimated runtime is critically low'
        opdata: 'Runtime: {ITEM.LASTVALUE1}'
        priority: HIGH
        tags:
        - tag: scope
          value: capacity
      - uuid: b4a07d2ca8ca4da782eb158d7d37bc34
        expression: last(/Template UPS RFC1628 SNMP/ups.battery.runtime.min)<{$UPS.BATTERY.RUNTIME.MIN.WARN} and last(/Template UPS RFC1628 SNMP/ups.battery.runtime.min)>0
        name: 'UPS: Estimated runtime is low'
        opdata: 'Runtime: {ITEM.LASTVALUE1}'
        priority: WARNING
        tags:
        - tag: scope
          value: capacity
    - uuid: cdb576f7781c481eac33fa3772b0b2fa
