zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: ba97e174c9e044f2b499cc435ff17587
      name: Templates/Power
  templates:
    - uuid: c736cd8f373d423282f577229833af1d
      template: 'Raritan PDU by SNMP'
      name: 'Raritan PDU by SNMP'
      description: |
        Generic Zabbix 7.0 starter template for Raritan intelligent PDUs using numeric OIDs from the official PDU2-MIB.
        
        Scope:
        - PDU unit inventory
        - Outlet inventory and switching state
        - Inlet current / voltage / active power
        - Outlet current / active power
        - External temperature / humidity / airflow / air pressure
        - External water leak and smoke detection
        
        Notes:
        - Numeric OIDs are used; importing vendor MIB files into Zabbix is not required.
        - Alarm logic is primarily based on device-reported sensor state, so thresholding should be configured on the Raritan side.
        - Measurement values are scaled with the sensor decimal-digits field by JavaScript preprocessing.
        - Sensor coverage varies by PDU family, installed sensors and firmware.
      groups:
        - name: Templates/Power
      items:
        - uuid: 047aba7f389d45bca7578193e2dd7272
          name: 'PDU count'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.13742.6.3.1
          key: raritan.pdu.count
          delay: '{$RARITAN.PDU.INVENTORY}'
          history: 30d
          trends: 90d
      discovery_rules:
        - uuid: 30da3be85c6644989d942c0393700ace
          name: 'External airflow discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#NAME},1.3.6.1.4.1.13742.6.3.6.3.1.4,{#TYPE},1.3.6.1.4.1.13742.6.3.6.3.1.2,{#DIGITS},1.3.6.1.4.1.13742.6.3.6.3.1.17]'
          key: raritan.pdu.ext.airflow.discovery
          delay: '{$RARITAN.PDU.DISCOVERY}'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#TYPE}'
                value: ^12$
                formulaid: A
          lifetime: 30d
          item_prototypes:
            - uuid: 8f1ad7310457430786f3203e2cd478de
              name: 'External airflow decimal digits {#NAME}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.13742.6.3.6.3.1.17.{#SNMPINDEX}'
              key: 'raritan.pdu.ext.airflow.digits[{#SNMPINDEX}]'
              delay: '{$RARITAN.PDU.INVENTORY}'
              history: 30d
              value_type: TEXT
              trends: '0'
            - uuid: 8d1ce92003644f0a9bc157527f8072b6
              name: 'External airflow name {#NAME}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.13742.6.3.6.3.1.4.{#SNMPINDEX}'
              key: 'raritan.pdu.ext.airflow.name[{#SNMPINDEX}]'
              delay: '{$RARITAN.PDU.INVENTORY}'
              history: 30d
              value_type: TEXT
              trends: '0'
            - uuid: cbf959cd681d452fad2f9eb7e59712dc
              name: 'External airflow state [{#NAME}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.13742.6.5.5.3.1.3.{#SNMPINDEX}'
              key: 'raritan.pdu.ext.airflow.state[{#SNMPINDEX}]'
              delay: '{$RARITAN.PDU.POLL}'
              history: 30d
              trends: 90d
              valuemap:
                name: 'Raritan sensor state'
              trigger_prototypes:
                - uuid: 7c78809b212e47e4854324e542d15dc1
                  expression: 'last(/Raritan PDU by SNMP/raritan.pdu.ext.airflow.state[{#SNMPINDEX}])=2 or last(/Raritan PDU by SNMP/raritan.pdu.ext.airflow.state[{#SNMPINDEX}])=6 or last(/Raritan PDU by SNMP/raritan.pdu.ext.airflow.state[{#SNMPINDEX}])=14 or last(/Raritan PDU by SNMP/raritan.pdu.ext.airflow.state[{#SNMPINDEX}])=26 or last(/Raritan PDU by SNMP/raritan.pdu.ext.airflow.state[{#SNMPINDEX}])=28'
                  name: 'External airflow [{#NAME}] is in critical state'
                  priority: HIGH
                - uuid: b3e95c84f61f4d47bc7ca0980e0656ea
                  expression: 'last(/Raritan PDU by SNMP/raritan.pdu.ext.airflow.state[{#SNMPINDEX}])=3 or last(/Raritan PDU by SNMP/raritan.pdu.ext.airflow.state[{#SNMPINDEX}])=5 or last(/Raritan PDU by SNMP/raritan.pdu.ext.airflow.state[{#SNMPINDEX}])=27'
                  name: 'External airflow [{#NAME}] is in warning state'
                  priority: WARNING
            - uuid: afe87453d22c42549059549cda8460a2
              name: 'External airflow sensor type {#NAME}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.13742.6.3.6.3.1.2.{#SNMPINDEX}'
              key: 'raritan.pdu.ext.airflow.type[{#SNMPINDEX}]'
              delay: '{$RARITAN.PDU.INVENTORY}'
              history: 30d
              value_type: TEXT
              trends: '0'
            - uuid: 92fb686dbabe464dbc3e8966cb4fff18
              name: 'External airflow value [{#NAME}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.13742.6.5.5.3.1.4.{#SNMPINDEX}'
              key: 'raritan.pdu.ext.airflow.value[{#SNMPINDEX}]'
              delay: '{$RARITAN.PDU.POLL}'
              history: 30d
              value_type: FLOAT
              trends: 90d
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var d = Number(''{#DIGITS}''); if (isNaN(d) || d < 0) d = 0; var n = Number(value); if (isNaN(n)) throw ''NaN''; return n / Math.pow(10, d);'
