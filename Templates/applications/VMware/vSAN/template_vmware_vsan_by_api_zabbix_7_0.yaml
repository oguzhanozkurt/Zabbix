        name: 'vSAN network [{#HOST.NAME}/{#IF.NAME}]: Drops'
        type: DEPENDENT
        key: vsan.network.drops["{#CLUSTER.NAME}","{#HOST.NAME}","{#IF.NAME}"]
        delay: '0'
        history: 30d
        trends: '0'
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.networks[?(@.cluster=="{#CLUSTER.NAME}" && @.host=="{#HOST.NAME}" && @.ifname=="{#IF.NAME}")].drops.first()
        master_item:
          key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
        tags:
        - tag: component
          value: vsan
        - tag: scope
          value: network
        - tag: cluster
          value: '{#CLUSTER.NAME}'
        - tag: host
          value: '{#HOST.NAME}'
        - tag: interface
          value: '{#IF.NAME}'
      trigger_prototypes:
      - uuid: d51c26c925e248b593949b3c19d2f6e8
        expression: last(/Template VMware vSAN by API/vsan.network.health["{#CLUSTER.NAME}","{#HOST.NAME}","{#IF.NAME}"])<>1
        name: vSAN network [{#HOST.NAME}/{#IF.NAME}] health is not OK
        priority: HIGH
        manual_close: 'YES'
        tags:
        - tag: scope
          value: network
        - tag: component
          value: vsan
      - uuid: e8673d10a90443f9a10fd13b16c2cbe7
        expression: avg(/Template VMware vSAN by API/vsan.network.util_pct["{#CLUSTER.NAME}","{#HOST.NAME}","{#IF.NAME}"],5m)>{$VSAN.NET.UTIL.WARN}
        name: vSAN network [{#HOST.NAME}/{#IF.NAME}] utilization is high
        priority: WARNING
        manual_close: 'YES'
        tags:
        - tag: scope
          value: network
        - tag: component
          value: vsan
      - uuid: 3676b09f52ba4bdbb8fd5204ee2e3ae8
        expression: min(/Template VMware vSAN by API/vsan.network.errors["{#CLUSTER.NAME}","{#HOST.NAME}","{#IF.NAME}"],5m)>{$VSAN.NET.ERROR.MAX}
        name: vSAN network [{#HOST.NAME}/{#IF.NAME}] has errors
        priority: HIGH
        manual_close: 'YES'
        tags:
        - tag: scope
          value: network
        - tag: component
          value: vsan
      - uuid: 9c6699763cb3413ab1c5da5afaf3d6b4
        expression: min(/Template VMware vSAN by API/vsan.network.drops["{#CLUSTER.NAME}","{#HOST.NAME}","{#IF.NAME}"],5m)>{$VSAN.NET.ERROR.MAX}
        name: vSAN network [{#HOST.NAME}/{#IF.NAME}] has drops
        priority: HIGH
        manual_close: 'YES'
        tags:
        - tag: scope
          value: network
        - tag: component
          value: vsan
    - uuid: 3197781502f6427c9c4b281420c44cfd
      name: 'vSAN: Health check discovery'
      type: DEPENDENT
      key: vsan.health_check.discovery
      delay: '0'
      lifetime: 30d
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.lld.health_checks
      master_item:
        key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
      filter:
        evaltype: AND
        conditions:
        - macro: '{#CLUSTER.NAME}'
          value: '{$VSAN.CLUSTER.MATCHES}'
          formulaid: A
        - macro: '{#CLUSTER.NAME}'
          value: '{$VSAN.CLUSTER.NOT_MATCHES}'
          operator: NOT_MATCHES_REGEX
          formulaid: B
      description: Discovers individual vSAN health checks.
      item_prototypes:
      - uuid: 9e9a2cf75e864f1dbca517e8ff05c243
        name: 'vSAN health [{#CLUSTER.NAME}]: {#CHECK.GROUP} - {#CHECK.NAME}'
        type: DEPENDENT
        key: vsan.health_check.status["{#CLUSTER.NAME}","{#CHECK.ID}"]
        delay: '0'
        history: 30d
        trends: '0'
        valuemap:
          name: vSAN health status
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.health_checks[?(@.cluster=="{#CLUSTER.NAME}" && @.id=="{#CHECK.ID}")].status.first()
        master_item:
          key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
        tags:
        - tag: component
          value: vsan
        - tag: scope
          value: health
        - tag: cluster
          value: '{#CLUSTER.NAME}'
        - tag: check_group
          value: '{#CHECK.GROUP}'
      - uuid: 359b8c362317461e9849e81ef433fe9d
        name: 'vSAN health [{#CLUSTER.NAME}]: {#CHECK.NAME} message'
        type: DEPENDENT
        key: vsan.health_check.message["{#CLUSTER.NAME}","{#CHECK.ID}"]
        delay: '0'
        history: 7d
        value_type: TEXT
        trends: '0'
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.health_checks[?(@.cluster=="{#CLUSTER.NAME}" && @.id=="{#CHECK.ID}")].message.first()
        master_item:
          key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
        tags:
        - tag: component
          value: vsan
        - tag: scope
          value: health
        - tag: cluster
          value: '{#CLUSTER.NAME}'
        - tag: check_group
          value: '{#CHECK.GROUP}'
      trigger_prototypes:
      - uuid: f2fdf7284a2e44d1a138edc1c6a46ce2
        expression: last(/Template VMware vSAN by API/vsan.health_check.status["{#CLUSTER.NAME}","{#CHECK.ID}"])=2
        name: 'vSAN health check warning: [{#CLUSTER.NAME}] {#CHECK.GROUP} - {#CHECK.NAME}'
        priority: AVERAGE
        manual_close: 'YES'
        tags:
        - tag: scope
          value: availability
        - tag: component
          value: vsan
      - uuid: 4f38e13d14f9445a8463f76d5b68b998
        expression: last(/Template VMware vSAN by API/vsan.health_check.status["{#CLUSTER.NAME}","{#CHECK.ID}"])=3
        name: 'vSAN health check failed: [{#CLUSTER.NAME}] {#CHECK.GROUP} - {#CHECK.NAME}'
        priority: HIGH
        manual_close: 'YES'
        tags:
        - tag: scope
          value: availability
        - tag: component
          value: vsan
    macros:
    - macro: '{$VMWARE.URL}'
      value: https://vcenter.example.local/sdk
      description: vCenter SDK URL used by the external vSAN collector.
    - macro: '{$VMWARE.USER}'
      value: zabbix-readonly@vsphere.local
      description: Read-only vCenter user with vSAN visibility.
    - macro: '{$VMWARE.PASSWORD}'
      type: SECRET_TEXT
      description: Password for {$VMWARE.USER}. Set at host level.
    - macro: '{$VSAN.CLUSTER.MATCHES}'
      value: .*
      description: Regex filter for vSAN clusters to include.
    - macro: '{$VSAN.CLUSTER.NOT_MATCHES}'
      value: CHANGE_IF_NEEDED
      description: Regex filter for vSAN clusters to exclude.
    - macro: '{$VSAN.UPDATE.INTERVAL}'
      value: 5m
      description: Master collector interval.
    - macro: '{$VSAN.API.TIMEOUT}'
      value: '60'
      description: Timeout passed to external collector in seconds.
    - macro: '{$VSAN.DATA.MAXAGE}'
      value: 15m
      description: Maximum age without collector timestamp before stale data alarm.
    - macro: '{$VSAN.COLLECTOR.DURATION.MAX}'
      value: '30'
      description: Collector runtime threshold in seconds.
    - macro: '{$VSAN.CAPACITY.HIGH}'
      value: '85'
      description: Cluster capacity used percent high threshold.
    - macro: '{$VSAN.CAPACITY.DISASTER}'
      value: '90'
      description: Cluster capacity used percent disaster threshold.
    - macro: '{$VSAN.DISK.USED.WARN}'
      value: '80'
      description: Disk group used percent warning threshold.
    - macro: '{$VSAN.DISK.USED.HIGH}'
      value: '90'
      description: Disk group used percent high threshold.
    - macro: '{$VSAN.CAPACITY_DISK.USED.HIGH}'
      value: '90'
      description: Capacity disk used percent high threshold.
    - macro: '{$VSAN.LATENCY.HIGH}'
      value: '50'
      description: Cluster/diskgroup/disk latency high threshold in ms.
    - macro: '{$VSAN.LATENCY.DISASTER}'
      value: '100'
      description: Cluster latency disaster threshold in ms.
    - macro: '{$VSAN.VM.LATENCY.HIGH}'
      value: '50'
      description: VM latency threshold in ms.
    - macro: '{$VSAN.VDISK.LATENCY.HIGH}'
      value: '50'
      description: Virtual disk latency threshold in ms.
    - macro: '{$VSAN.RESYNC.MAX.TIME}'
      value: 1h
      description: If resync components stay above zero for this period, trigger an alarm.
    - macro: '{$VSAN.NET.ERROR.MAX}'
      value: '0'
      description: Network errors/drops threshold.
    - macro: '{$VSAN.NET.UTIL.WARN}'
      value: '80'
      description: Network utilization warning threshold.
    - macro: '{$VSAN.CONGESTION.HIGH}'
      value: '30'
      description: vSAN congestion percent threshold.
    valuemaps:
    - uuid: d6599e96de2948c08d7279ff9be45a84
      name: vSAN health status
      mappings:
      - value: '0'
        newvalue: Unknown
      - value: '1'
        newvalue: OK
      - value: '2'
        newvalue: Warning
      - value: '3'
        newvalue: Critical
    - uuid: 694b242d8da14d6a914496d8cfce4be5
      name: vSAN collector status
      mappings:
      - value: '0'
        newvalue: Failed
      - value: '1'
        newvalue: OK
    - uuid: f004160e71ad411ba63a3cf5f8721a83
      name: Yes/No
      mappings:
      - value: '0'
        newvalue: 'No'
      - value: '1'
        newvalue: 'Yes'
