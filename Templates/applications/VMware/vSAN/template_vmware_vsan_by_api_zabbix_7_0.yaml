zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 5975901e4d364c088895b06d333067ab
    name: Templates/Virtualization
  templates:
  - uuid: aa91686fc92147388981e222943e85fa
    template: Template VMware vSAN by API
    name: Template VMware vSAN by API
    description: Full vSAN monitoring template for Zabbix 7.0. It expects a single external collector JSON payload and uses dependent items, LLD rules and item/trigger prototypes for vSAN health, capacity, resync, disk groups, capacity disks, VM/vDisk performance and vSAN network metrics. The collector script is not embedded in this export.
    vendor:
      name: ChatGPT
      version: '1.0'
    groups:
    - name: Templates/Virtualization
    items:
    - uuid: d89e37c72f4b4ffa83562b8d9577dfbe
      name: 'vSAN: API raw data'
      type: EXTERNAL
      key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
      delay: '{$VSAN.UPDATE.INTERVAL}'
      history: 1d
      value_type: TEXT
      trends: '0'
      description: Raw JSON returned by zbx_vsan_api.py. The script must be placed under Zabbix ExternalScripts directory on the server or proxy running this item.
      tags:
      - tag: component
        value: vsan
      - tag: scope
        value: raw
    - uuid: dd0c77f68a3b42198258d7b19c5d00b3
      name: 'vSAN collector: Status'
      type: DEPENDENT
      key: vsan.collector.status
      delay: '0'
      history: 30d
      trends: '0'
      valuemap:
        name: vSAN collector status
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.collector.status
      master_item:
        key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
      tags:
      - tag: component
        value: vsan
      - tag: scope
        value: collector
      triggers:
      - uuid: 49ed0b64d6e94570a8b260b4bf72974e
        expression: last(/Template VMware vSAN by API/vsan.collector.status)<>1
        name: vSAN collector failed on {HOST.NAME}
        priority: HIGH
        manual_close: 'YES'
        tags:
        - tag: scope
          value: availability
        - tag: component
          value: vsan
    - uuid: 6b9c2d46b29941de8e455639e9faf3a5
      name: 'vSAN collector: Message'
      type: DEPENDENT
      key: vsan.collector.message
      delay: '0'
      history: 7d
      value_type: TEXT
      trends: '0'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.collector.message
      master_item:
        key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
      tags:
      - tag: component
        value: vsan
      - tag: scope
        value: collector
    - uuid: 09a6520c0eb54caab91739c131e514ee
      name: 'vSAN collector: Duration'
      type: DEPENDENT
      key: vsan.collector.duration
      delay: '0'
      history: 30d
      value_type: FLOAT
      trends: 90d
      units: s
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.collector.duration_sec
      master_item:
        key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
      tags:
      - tag: component
        value: vsan
      - tag: scope
        value: collector
      triggers:
      - uuid: 35fec9ea06b74b6da502e9346f6f838d
        expression: min(/Template VMware vSAN by API/vsan.collector.duration,15m)>{$VSAN.COLLECTOR.DURATION.MAX}
        name: vSAN collector is slow on {HOST.NAME}
        priority: WARNING
        manual_close: 'YES'
        tags:
        - tag: scope
          value: performance
        - tag: component
          value: vsan
    - uuid: 3bf80caf24a24ec0ad727fed7a63105b
      name: 'vSAN collector: Last successful timestamp'
      type: DEPENDENT
      key: vsan.collector.timestamp
      delay: '0'
      history: 30d
      trends: '0'
      units: unixtime
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.collector.timestamp
      master_item:
        key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
      tags:
      - tag: component
        value: vsan
      - tag: scope
        value: collector
      triggers:
      - uuid: 9c694827e0e24bf09516dfb207b99760
        expression: nodata(/Template VMware vSAN by API/vsan.collector.timestamp,{$VSAN.DATA.MAXAGE})=1
        name: vSAN API data is stale on {HOST.NAME}
        priority: HIGH
        manual_close: 'YES'
        tags:
        - tag: scope
          value: availability
        - tag: component
          value: vsan
    - uuid: e2bacc64725f4ec3ba1a37037b4228a1
      name: 'vSAN collector: Clusters total'
      type: DEPENDENT
      key: vsan.collector.clusters_total
      delay: '0'
      history: 30d
      trends: '0'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.collector.clusters_total
      master_item:
        key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
      tags:
      - tag: component
        value: vsan
      - tag: scope
        value: collector
    discovery_rules:
    - uuid: b64a3b135ffd43fda46860289f70b923
      name: 'vSAN: Cluster discovery'
      type: DEPENDENT
      key: vsan.cluster.discovery
      delay: '0'
      lifetime: 30d
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.lld.clusters
      master_item:
        key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
      filter:
        evaltype: AND
        conditions:
        - macro: '{#CLUSTER.NAME}'
          value: '{$VSAN.CLUSTER.MATCHES}'
          formulaid: A
        - macro: '{#CLUSTER.NAME}'
          value: '{$VSAN.CLUSTER.NOT_MATCHES}'
          operator: NOT_MATCHES_REGEX
          formulaid: B
      description: Discovers vSAN clusters returned by the collector.
      item_prototypes:
      - uuid: 3719c96a87064251a218abe9d3e9290b
        name: 'vSAN cluster [{#CLUSTER.NAME}]: Health'
        type: DEPENDENT
        key: vsan.cluster.health["{#CLUSTER.NAME}"]
        delay: '0'
        history: 30d
        trends: '0'
        valuemap:
          name: vSAN health status
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.clusters[?(@.name=="{#CLUSTER.NAME}")].health.first()
        master_item:
          key: zbx_vsan_api.py["{$VMWARE.URL}","{$VMWARE.USER}","{$VMWARE.PASSWORD}","{$VSAN.CLUSTER.MATCHES}","{$VSAN.CLUSTER.NOT_MATCHES}","{$VSAN.API.TIMEOUT}"]
        tags:
