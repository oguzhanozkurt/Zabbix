zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 574eec884aef40e49fefb46e2e833d99
    name: Templates/Security
  templates:
  - uuid: 93d77569942947a393562bfac0bc737d
    template: Template Trend Micro Deep Security Computers by HTTP
    name: Template Trend Micro Deep Security Computers by HTTP
    description: 'Best-effort Zabbix 7.0 YAML draft for Trend Micro Deep Security / Workload Security per-computer monitoring by HTTP.


      Design:

      - One HTTP master item collects /api/computers with computerStatus and allSecurityModules expanded.

      - One dependent discovery rule creates per-computer prototypes.

      - A per-computer raw dependent prototype feeds all child dependent item prototypes.


      Notes:

      - Module names/paths can vary between DSM versions. If a module JSONPath becomes unsupported, review the exact JSON returned by your environment.

      - For large environments you may want to replace the HTTP master item with a Script item that handles paging.

      '
    groups:
    - name: Templates/Security
    macros:
    - macro: '{$TM.DSM.URL}'
      value: https://dsm.example.com:4119
      description: Base URL of Trend Micro DSM / Workload Security Manager.
    - macro: '{$TM.DSM.API.KEY}'
      type: SECRET_TEXT
      value: ''
      description: Trend Micro DSM API secret key.
    - macro: '{$TM.DSM.API.VERSION}'
      value: v1
      description: API version header value.
    - macro: '{$TM.DSM.COMPUTERS.DELAY}'
      value: 10m
      description: Update interval for full computer collection.
    - macro: '{$TM.DSM.LLD.DELAY}'
      value: 30m
      description: Discovery interval.
    - macro: '{$TM.DSM.TIMEOUT}'
      value: 30s
      description: HTTP timeout for DSM requests.
    - macro: '{$TM.DSM.COMPUTER.MATCHES}'
      value: .*
      description: LLD include regex for computer display names.
    - macro: '{$TM.DSM.COMPUTER.NOT_MATCHES}'
      value: ^$
      description: LLD exclude regex for computer display names.
    items:
    - uuid: 1b9b5cceb8154b51ae89c62e41e24417
      name: 'Trend Micro DSM: Computers full raw'
      type: HTTP_AGENT
      key: tm.dsm.computers.full.raw
      delay: '{$TM.DSM.COMPUTERS.DELAY}'
      history: 1d
      trends: '0'
      value_type: TEXT
      description: Raw list of computers with computerStatus and allSecurityModules expanded.
      timeout: '{$TM.DSM.TIMEOUT}'
      url: '{$TM.DSM.URL}/api/computers?expand=computerStatus,allSecurityModules'
      status_codes: 200-299
      headers:
      - name: api-secret-key
        value: '{$TM.DSM.API.KEY}'
      - name: api-version
        value: '{$TM.DSM.API.VERSION}'
      retrieve_mode: BODY
      request_method: GET
      output_format: RAW
      verify_peer: 'NO'
      verify_host: 'NO'
      preprocessing:
      - type: CHECK_JSON_ERROR
        parameters:
        - $.error.message
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      tags:
      - tag: component
        value: raw
      - tag: component
        value: computers
    discovery_rules:
    - uuid: ab578019aca94114ab36a5199a1806e6
      name: 'Trend Micro DSM: Computer discovery'
      type: DEPENDENT
      key: tm.dsm.computers.discovery
      delay: '0'
      lifetime_type: DELETE_NEVER
      enabled_lifetime_type: DISABLE_NEVER
      description: Discover computers returned by the DSM API.
      filter:
        evaltype: AND
        conditions:
        - macro: '{#DISPLAYNAME}'
          value: '{$TM.DSM.COMPUTER.MATCHES}'
        - macro: '{#DISPLAYNAME}'
          value: '{$TM.DSM.COMPUTER.NOT_MATCHES}'
          operator: NOT_MATCHES_REGEX
      master_item:
        key: tm.dsm.computers.full.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var a = JSON.parse(value);\n\nreturn JSON.stringify(a.map(function(c){\n  return {\n    \"{#ID}\": String(c.ID || \"\"),\n    \"{#HOSTNAME}\": c.hostName || \"\",\n    \"{#DISPLAYNAME}\": c.displayName || c.hostName || (\"ID-\" + c.ID),\n    \"{#POLICYID}\": String(c.policyID || \"\"),\n    \"{#PLATFORM}\": c.platform || \"\",\n    \"{#AGENTVER}\": c.agentVersion || \"\",\n    \"{#LASTIP}\": c.lastIPUsed || \"\"\n  };\n}));"
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      item_prototypes:
      - uuid: e28d65f23e17482294d4f75d53c60d4a
        name: 'Trend Micro DSM: Computer raw [{#DISPLAYNAME}]'
        type: DEPENDENT
        key: tm.computer.raw[{#ID}]
        delay: '0'
        history: 1d
        trends: '0'
        value_type: TEXT
        description: Full raw object for one discovered computer.
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - "var a = JSON.parse(value);\nvar id = String('{#ID}');\n\nfor (var i = 0; i < a.length; i++) {\n  if (String(a[i].ID) === id) {\n    return JSON.stringify(a[i]);\n  }\n}\nthrow 'Computer not found: ' + id;"
        master_item:
          key: tm.dsm.computers.full.raw
        tags:
        - tag: component
          value: raw
        - tag: computer
          value: '{#DISPLAYNAME}'
      - uuid: 3fe3d9f37fb54abd9a9b087cad50c2a0
        name: 'Trend Micro DSM: Host name [{#DISPLAYNAME}]'
        type: DEPENDENT
        key: tm.computer.hostname[{#ID}]
        delay: '0'
        history: 30d
        trends: '0'
        value_type: CHAR
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.hostName
          error_handler: DISCARD_VALUE
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 12h
        master_item:
          key: tm.computer.raw[{#ID}]
        tags:
        - tag: component
          value: inventory
        - tag: computer
          value: '{#DISPLAYNAME}'
      - uuid: 5116e20628e14d378b7ed39f99799abe
        name: 'Trend Micro DSM: Agent status [{#DISPLAYNAME}]'
        type: DEPENDENT
        key: tm.computer.agent.status[{#ID}]
        delay: '0'
        history: 30d
        trends: '0'
        value_type: CHAR
        preprocessing:
