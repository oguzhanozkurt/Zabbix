      - uuid: a315eea91c294986a3513e7ad71e21bf
        expression: last(/Template Trend Micro Deep Security Computers by HTTP/tm.computer.noagent[{#ID}])=1
        name: 'Trend Micro DSM: No agent or appliance detected on [{#DISPLAYNAME}]'
        priority: HIGH
        description: The discovered computer object does not have an agent or appliance fingerprint.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: security
        - tag: computer
          value: '{#DISPLAYNAME}'
      - uuid: e67bd45c06fc4243b1f3e6a75c23d01d
        expression: last(/Template Trend Micro Deep Security Computers by HTTP/tm.computer.agent.status[{#ID}])<>"active"
        name: 'Trend Micro DSM: Agent is not active on [{#DISPLAYNAME}]'
        priority: AVERAGE
        description: The computerStatus.agentStatus value is different from active.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: health
        - tag: computer
          value: '{#DISPLAYNAME}'
      - uuid: 712fd8cff6f8476e9a5d57fc3902f188
        expression: find(/Template Trend Micro Deep Security Computers by HTTP/tm.computer.agent.message[{#ID}],,"iregexp","Offline")=1
        name: 'Trend Micro DSM: Agent appears offline on [{#DISPLAYNAME}]'
        priority: AVERAGE
        description: The first agent status message contains the word Offline.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: availability
        - tag: computer
          value: '{#DISPLAYNAME}'
      - uuid: 220554c308264e1e9bcd68d099222984
        expression: find(/Template Trend Micro Deep Security Computers by HTTP/tm.computer.agent.message[{#ID}],,"iregexp","Upgrade Recommended")=1
        name: 'Trend Micro DSM: Agent upgrade recommended on [{#DISPLAYNAME}]'
        priority: WARNING
        description: The first agent status message contains the text Upgrade Recommended.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: maintenance
        - tag: computer
          value: '{#DISPLAYNAME}'
      - uuid: e7224c9ceda242128ad874c26bc1fbeb
        expression: last(/Template Trend Micro Deep Security Computers by HTTP/tm.computer.am.state[{#ID}])="on" and last(/Template Trend Micro Deep Security Computers by HTTP/tm.computer.am.status[{#ID}])<>"active"
        name: 'Trend Micro DSM: Anti-Malware module unhealthy on [{#DISPLAYNAME}]'
        priority: HIGH
        description: The Anti-Malware module is reported as enabled but its moduleStatus.agentStatus is not active.
        manual_close: 'YES'
        tags:
        - tag: scope
          value: health
        - tag: component
          value: am
        - tag: computer
          value: '{#DISPLAYNAME}'
      - uuid: 0e89d37a58c3464d8f825d54bd9f47bf
        expression: last(/Template Trend Micro Deep Security Computers by HTTP/tm.computer.fw.state[{#ID}])="on" and last(/Template Trend Micro Deep Security Computers by HTTP/tm.computer.fw.status[{#ID}])<>"active"
