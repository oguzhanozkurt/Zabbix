          parameters:
          - $.computerStatus.agentStatus
          error_handler: DISCARD_VALUE
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: tm.computer.raw[{#ID}]
        tags:
        - tag: component
          value: agent
        - tag: computer
          value: '{#DISPLAYNAME}'
      - uuid: 2d1598f1cb6841c8a2603f2f8c889972
