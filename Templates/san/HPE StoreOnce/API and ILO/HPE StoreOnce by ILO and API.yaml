        - uuid: 7f3c636f2edb4d6496e922480c827b24
          name: 'Storeonce: Get Storage Volume Metrics'
          type: SCRIPT
          key: storeonce.get.volume
          delay: 5m
          history: 90d
          value_type: TEXT
          trends: '0'
          params: |
            var StoreOnce = {
                params: {},
                ip: "",
                token: "",
              
                setParams: function (params) {
                  StoreOnce.params.username = params.username;
                  StoreOnce.params.password = params.password;
                  StoreOnce.params.grant_type = params.grant_type;
                  StoreOnce.ip = params.storeonce_ip;
                },
              
                login: function () {
                  var login_request = new HttpRequest();
                  login_request.addHeader("Content-Type: application/json");
                  login_request.addHeader("Accept: application/json");
                  var login_response = JSON.parse(login_request.post("https://" + StoreOnce.ip + "/pml/login/authenticatewithobject", JSON.stringify(StoreOnce.params)));
                  StoreOnce.token = login_response.access_token;
                },
              
                request: function (url) {
                
                  var response, request = new HttpRequest();
                  if (StoreOnce.token) {
                      request.addHeader('Authorization: Bearer ' + StoreOnce.token);
                      request.addHeader("Accept: application/json");
                      request.addHeader("Content-Type: application/json");
                      response = request.get(url);
                  }
                  if (request.getStatus() !== 200 || response === null) {
                      throw 'Request failed with status code ' + request.getStatus() + ': ' + response;
                  }
                  try {
                      return JSON.parse(response);
                  }
                  catch (error) {
                      throw 'Failed to parse response received from API.';
                  } 
              },
              
              getMetricsData: function() {
                var data = [];
                endpoints = {
                    'storage/overview': 'api/v1/management-services/local-storage/volumes',
                };
              
                Object.keys(endpoints).forEach(function (key) {
                  try{
                    temp_resp = StoreOnce.request("https://" + StoreOnce.ip + "/" + endpoints[key])["members"];
                    Object.keys(temp_resp).forEach(function (member) {
                      temp_json = {
                        'MemberName': temp_resp[member]["name"]
                      }
                      temp_json['MemberData'] = temp_resp[member];
                      data.push(temp_json)
                    });
                  }
                  catch(error){
                    data[key] = "Failed to fetch " + error;
                  }
                });
              
                return data;
              }
              
              }
              
              try {
                  StoreOnce.setParams(JSON.parse(value));
                  StoreOnce.login(JSON.parse(value).storeonce_ip);
                  return JSON.stringify(StoreOnce.getMetricsData());
                } catch (error) {
                  throw "Webhook failed: " + error;
                }
          timeout: 60s
          parameters:
            - name: grant_type
              value: password
            - name: password
              value: '{$STOREONCE.PASSWORD}'
            - name: storeonce_ip
              value: '{HOST.CONN}'
            - name: username
              value: '{$STOREONCE.USER}'
          tags:
            - tag: is_bulk_data
              value: 'yes'
            - tag: yontem
              value: api
