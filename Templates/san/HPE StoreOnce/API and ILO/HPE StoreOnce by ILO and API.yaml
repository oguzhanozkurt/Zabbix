zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 8a2cd1211daa408ba22fe2d8bae017aa
      name: Templates/Storeonce
  templates:
    - uuid: dcf8553b79d44140b81a7b70a4443e11
      template: 'HPE StoreOnce by ILO and API'
      name: 'HPE StoreOnce by ILO and API'
      groups:
        - name: Templates/Storeonce
      items:
        - uuid: da073ea2e2904ae3acf92c1f13c967b9
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 1w
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 2c404fc8bb18492dbe462eba75df68dc
              expression: 'max(/HPE StoreOnce by ILO and API/icmpping,#3)=0'
              name: 'Unavailable by ICMP ping'
              priority: DISASTER
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
        - uuid: b14096504e784b06a9cdcf9cf93fceef
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          history: 1w
          value_type: FLOAT
          units: '%'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 5b9eac486b0e4fbdb840f21b00c907d5
              expression: 'min(/HPE StoreOnce by ILO and API/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/HPE StoreOnce by ILO and API/icmppingloss,5m)<100'
              name: 'High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/HPE StoreOnce by ILO and API/icmpping,#3)=0'
        - uuid: 4a7d9cd63062433b8c7be1562a485641
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          history: 1w
          value_type: FLOAT
          units: s
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 4c233049d9ae446f97fb63e1eb551452
              expression: 'avg(/HPE StoreOnce by ILO and API/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'High ICMP ping loss'
                  expression: 'min(/HPE StoreOnce by ILO and API/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/HPE StoreOnce by ILO and API/icmppingloss,5m)<100'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/HPE StoreOnce by ILO and API/icmpping,#3)=0'
        - uuid: 05c8fe31cc024dd58c6d6c1b760c2019
          name: 'System: Temperature status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.232.6.2.6.1.0
          key: 'sensor.temp.status[cpqHeThermalCondition.0]'
          history: 7d
          trends: 0d
          description: |
            MIB: CPQHLTH-MIB
            This value specifies the overall condition of the system's thermal environment.
            This value will be one of the following:
            other(1)  Temperature could not be determined.
            ok(2)  The temperature sensor is within normal operating range.
            degraded(3)  The temperature sensor is outside of normal operating range.
            failed(4)  The temperature sensor detects a condition that could  permanently damage the system.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: Application
              value: Temperature
        - uuid: ad5af2afe5684970957ab76dee228cca
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          history: 2w
          value_type: LOG
          trends: '0'
          description: 'Item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: Application
              value: General
        - uuid: 624b6995d3b348f5adc530cb828e34b7
          name: 'Storage Health Status percent'
          type: DEPENDENT
          key: storage.health.status.percent
          delay: '0'
          history: 90d
          value_type: FLOAT
          units: '%'
          preprocessing:
            - type: REGEX
              parameters:
                - '(?i)(\d+(?:\.\d+)?)\s*(?:%|percent)'
                - \1
              error_handler: DISCARD_VALUE
          master_item:
            key: storeonce.storage.health.string
          triggers:
            - uuid: 4548faeaebae46e998b4d8f2c933d942
              expression: 'last(/HPE StoreOnce by ILO and API/storage.health.status.percent)>80'
              name: 'Storage disk usage is higher than %80'
              priority: DISASTER
              manual_close: 'YES'
        - uuid: 94b4e3bcf75b4f7ebbead00448506471
          name: 'Storeonce: Last Alert Message'
          type: DEPENDENT
          key: storeonce.alert.last.message
          delay: '0'
          history: 90d
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["alerts/alerts"].members[0].description'
          master_item:
            key: storeonce.get.alert
          tags:
            - tag: yontem
              value: api
        - uuid: 6a36e6e5fa2b4fcdb4e483142639a03a
          name: 'Storeonce: Last Alert UUID'
          type: DEPENDENT
          key: storeonce.alert.last.uuid
          delay: '0'
          history: 90d
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["alerts/alerts"].members[0].uuid'
          master_item:
            key: storeonce.get.alert
          tags:
            - tag: yontem
              value: api
          triggers:
            - uuid: 41e95decf3ba46539c8a9b8e32a2d74d
              expression: 'change(/HPE StoreOnce by ILO and API/storeonce.alert.last.uuid)<>0'
              name: 'Storeonce: Yeni bir alarm olustu. Lutfen Alarm gecmisini kontrol ediniz !'
              priority: HIGH
              manual_close: 'YES'
        - uuid: 2b6aee04d70343b8b309146b1db72cca
          name: 'Storeonce: Get Alert Metrics'
          type: SCRIPT
          key: storeonce.get.alert
          delay: 5m
          history: 90d
          value_type: TEXT
          trends: '0'
          params: |
            var StoreOnce = {
                params: {},
                ip: "",
                token: "",
              
                setParams: function (params) {
                  StoreOnce.params.username = params.username;
                  StoreOnce.params.password = params.password;
                  StoreOnce.params.grant_type = params.grant_type;
                  StoreOnce.ip = params.storeonce_ip;
                },
              
                login: function () {
                  var login_request = new HttpRequest();
                  login_request.addHeader("Content-Type: application/json");
                  login_request.addHeader("Accept: application/json");
                  var login_response = JSON.parse(login_request.post("https://" + StoreOnce.ip + "/pml/login/authenticatewithobject", JSON.stringify(StoreOnce.params)));
                  StoreOnce.token = login_response.access_token;
                },
              
                request: function (url) {
                
                  var response, request = new HttpRequest();
                  if (StoreOnce.token) {
                      request.addHeader('Authorization: Bearer ' + StoreOnce.token);
                      request.addHeader("Accept: application/json");
                      request.addHeader("Content-Type: application/json");
                      response = request.get(url);
                  }
                  if (request.getStatus() !== 200 || response === null) {
                      throw 'Request failed with status code ' + request.getStatus() + ': ' + response;
                  }
                  try {
                      return JSON.parse(response);
                  }
                  catch (error) {
                      throw 'Failed to parse response received from API.';
                  } 
              },
              
              getMetricsData: function() {
                var data = {};
                endpoints = {
                    'alerts/alerts': "rest/alerts?query=%22level%20=%20%27ALERT%27%22&sort=created:desc&count=1",
                };
              
                Object.keys(endpoints).forEach(function (key) {
                  try{
                    full_url = "https://" + StoreOnce.ip + "/" + endpoints[key]
                    data[key] = StoreOnce.request(full_url);
                  }
                  catch(error){
                    data[key] = "Failed to fetch " + error + full_url;
                  }
                });
              
                return data;
              }
              
              }
              
              try {
                  StoreOnce.setParams(JSON.parse(value));
                  StoreOnce.login(JSON.parse(value).storeonce_ip);
                  return JSON.stringify(StoreOnce.getMetricsData());
                } catch (error) {
                  throw "Webhook failed: " + error;
                }
          timeout: 60s
          parameters:
            - name: grant_type
              value: password
            - name: password
              value: '{$STOREONCE.PASSWORD}'
            - name: storeonce_ip
              value: '{HOST.CONN}'
            - name: username
              value: '{$STOREONCE.USER}'
          tags:
            - tag: is_bulk_data
              value: 'yes'
            - tag: yontem
              value: api
