        - uuid: bd6dfc1e71c74ccc8092d033d7755ac0
          name: 'Temperature Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.232.6.2.6.8.1.1,{#SENSOR_LOCALE},1.3.6.1.4.1.232.6.2.6.8.1.3]'
          key: tempDescr.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#SENSOR_LOCALE}'
                value: (4|8|9|12|13)
                formulaid: A
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Scanning table of Temperature Sensor Entries: CPQHLTH-MIB::cpqHeTemperatureTable'
          item_prototypes:
            - uuid: 599b5252bdfa442d8132e94e1dd18f19
              name: '{#SNMPINDEX}: Temperature sensor condition'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.232.6.2.6.8.1.6.{#SNMPINDEX}'
              key: 'sensor.temp.condition[cpqHeTemperatureCondition.{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: CPQHLTH-MIB
                The Temperature sensor condition.
                This value will be one of the following:
                other(1)
                  Temperature could not be determined.
                ok(2)
                  The temperature sensor is within normal operating range.
                degraded(3)
                  The temperature sensor is outside of normal operating range.
                failed(4)
                  The temperature sensor detects a condition that could
                  permanently damage the system.
                The system will automatically shutdown if the failed(4) condition results, so it is unlikely that this value will ever be returned by the agent.  If the cpqHeThermalDegradedAction is set to shutdown(3) the system will be shutdown if the degraded(3) condition occurs.
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: Application
                  value: Temperature
              trigger_prototypes:
                - uuid: 418c081bc65f4e768a0e0d9c1f7c5b71
                  expression: 'last(/HPE StoreOnce by ILO and API/sensor.temp.condition[cpqHeTemperatureCondition.{#SNMPINDEX}]) = 1'
                  name: '{#SNMPINDEX}: Temperature could not be determined'
                  priority: INFO
                  description: 'Temperature could not be determined.'
                  manual_close: 'YES'
                - uuid: b871965948604da1b422651076340e0a
                  expression: 'last(/HPE StoreOnce by ILO and API/sensor.temp.condition[cpqHeTemperatureCondition.{#SNMPINDEX}]) = 4'
                  name: '{#SNMPINDEX}: The temperature sensor detects a condition that could permanently damage the system.'
                  priority: DISASTER
                  description: 'The system will automatically shutdown if the failed(4) condition results, so it is unlikely that this value will ever be returned by the agent.'
                - uuid: e1fef0b9066f474db1ce962d51d7e4f8
                  expression: 'last(/HPE StoreOnce by ILO and API/sensor.temp.condition[cpqHeTemperatureCondition.{#SNMPINDEX}]) = 3'
                  name: '{#SNMPINDEX}: The temperature sensor is outside of normal operating range'
                  priority: WARNING
                  description: 'If the cpqHeThermalDegradedAction is set to shutdown(3) the system will be shutdown if the degraded(3) condition occurs.'
            - uuid: 93c462a23fe24a9dac7aa6fb9eb423c4
              name: '{#SNMPINDEX}: Temperature sensor location'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.232.6.2.6.8.1.3.{#SNMPINDEX}'
              key: 'sensor.temp.locale[cpqHeTemperatureLocale.{#SNMPINDEX}]'
              history: 7d
              trends: 0d
              description: |
                MIB: CPQHLTH-MIB
                This specifies the location of the temperature sensor present in the system.
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: Application
                  value: Temperature
            - uuid: bb18557376314f9aaccc06e3b6fa80cb
              name: '{#SNMPINDEX}: Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.232.6.2.6.8.1.4.{#SNMPINDEX}'
              key: 'sensor.temp.value[cpqHeTemperatureCelsius.{#SNMPINDEX}]'
              history: 7d
              value_type: FLOAT
              units: Â°C
              description: |
                MIB: CPQHLTH-MIB
                Temperature readings of testpoint: {#SNMPINDEX}
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: Application
                  value: Temperature
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
