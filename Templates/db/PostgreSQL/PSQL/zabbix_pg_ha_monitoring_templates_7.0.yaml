zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: c7ac606335bc41fdbc031879db964801
      name: Templates/Databases
  templates:
    - uuid: a102c1bef0784d72ade44d3d75940643
      template: 'Template PostgreSQL Replication Source'
      name: 'Template PostgreSQL Replication Source'
      description: 'Monitors PostgreSQL pg_stat_replication and pg_replication_slots. Designed for primary nodes and standby leaders that stream to downstream replicas.'
      groups:
        - name: Templates/Databases
      items:
        - uuid: 7a802e28c793454c9b6ddf0dfb50dbf8
          name: 'PostgreSQL replication clients raw'
          key: 'pgsql.custom.query[{$PG.CONN.URI},{$PG.CONN.USER},{$PG.CONN.PASSWORD},{$PG.CONN.DB},zbx_pg_replication_clients]'
          history: '0'
          value_type: TEXT
          trends: '0'
          tags:
            - tag: component
              value: Replication
        - uuid: c7d7144e437b4221aa9b1235af9f26c4
          name: 'PostgreSQL replication slots raw'
          key: 'pgsql.custom.query[{$PG.CONN.URI},{$PG.CONN.USER},{$PG.CONN.PASSWORD},{$PG.CONN.DB},zbx_pg_replication_slots]'
          history: '0'
          value_type: TEXT
          trends: '0'
          tags:
            - tag: component
              value: Replication
      discovery_rules:
        - uuid: ce35c9eee7024744be1a33707f2ad31e
          name: 'PostgreSQL replication clients discovery'
          type: DEPENDENT
          key: pgsql.replication.clients.discovery
          delay: '0'
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 1e6eacb09e3d454d9abcb3aab3fbf791
              name: 'PostgreSQL replication client {#APP_NAME}/{#CLIENT_ADDR}: current to sent lag'
              type: DEPENDENT
              key: 'pgsql.replication.client.current_to_sent_lag_bytes[{#APP_NAME},{#CLIENT_ADDR}]'
              delay: '0'
              history: 30d
              units: B
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var app = "{#APP_NAME}";
                      var addr =  "{#CLIENT_ADDR}";
                      for (var i = 0; i < data.length; i++) {
                          if  (String(data[i].application_name) === app && String(data[i].client_addr)  === addr) {
                              var v = data[i]['current_to_sent_lag_bytes'];
                               if (v === undefined || v === null || v === '') return 0;
                               return v;
                          }
                      }
                      return 0;
              master_item:
                key: 'pgsql.custom.query[{$PG.CONN.URI},{$PG.CONN.USER},{$PG.CONN.PASSWORD},{$PG.CONN.DB},zbx_pg_replication_clients]'
              tags:
                - tag: component
                  value: Replication
              trigger_prototypes:
                - uuid: e3fcae2b353d436ea111faaa3bca3f2f
                  expression: 'min(/Template PostgreSQL Replication Source/pgsql.replication.client.current_to_sent_lag_bytes[{#APP_NAME},{#CLIENT_ADDR}],5m)>{$PG.REPL.LAG.WARN}'
                  name: 'PostgreSQL replication client {#APP_NAME}/{#CLIENT_ADDR}: primary cannot send WAL fast enough'
                  priority: HIGH
                  manual_close: 'YES'
            - uuid: 072133c8a2274e87a98c818fe89f7e1e
              name: 'PostgreSQL replication client {#APP_NAME}/{#CLIENT_ADDR}: flush lag seconds'
              type: DEPENDENT
              key: 'pgsql.replication.client.flush_lag_sec[{#APP_NAME},{#CLIENT_ADDR}]'
              delay: '0'
              history: 30d
              units: s
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var app = "{#APP_NAME}";
                      var addr =  "{#CLIENT_ADDR}";
                      for (var i = 0; i < data.length; i++) {
                          if  (String(data[i].application_name) === app && String(data[i].client_addr)  === addr) {
                              var v = data[i]['flush_lag_sec'];
                              if (v  === undefined || v === null || v === '') return 0;
                              return v;
                           }
                      }
                      return 0;
              master_item:
                key: 'pgsql.custom.query[{$PG.CONN.URI},{$PG.CONN.USER},{$PG.CONN.PASSWORD},{$PG.CONN.DB},zbx_pg_replication_clients]'
