        - uuid: 29182c1de802480bbdcfb555b19c0274
          name: 'Concurrent license count'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.2.1.0'
          key: fortinac.license.concurrent.max
          delay: 10m
          history: 30d
          tags:
            - tag: component
              value: license
        - uuid: b5a613946c94418dabc67318b7f16e80
          name: 'Concurrent license usage (%)'
          type: CALCULATED
          key: fortinac.license.concurrent.usage.pct
          history: 30d
          value_type: FLOAT
          units: '%'
          params: '100*last(//fortinac.license.concurrent.used)/last(//fortinac.license.concurrent.max)'
          tags:
            - tag: component
              value: license
          triggers:
            - uuid: 62392cbbe8084197a3d791410dc50869
              expression: 'min(/Fortinet FortiNAC by SNMP/fortinac.license.concurrent.usage.pct,5m)>={$FORTINAC.LIC.WARN} and min(/Fortinet FortiNAC by SNMP/fortinac.license.concurrent.usage.pct,5m)<{$FORTINAC.LIC.HIGH}'
              name: 'FortiNAC: Concurrent license usage high (>{$FORTINAC.LIC.WARN}%)'
              priority: WARNING
              description: 'Concurrent license usage is above the warning threshold for 5 minutes.'
              tags:
                - tag: component
                  value: license
                - tag: scope
                  value: capacity
            - uuid: 5f0d87be465748c5a340b8a243ff35b8
              expression: 'min(/Fortinet FortiNAC by SNMP/fortinac.license.concurrent.usage.pct,5m)>={$FORTINAC.LIC.HIGH}'
              name: 'FortiNAC: Concurrent license usage very high (>{$FORTINAC.LIC.HIGH}%)'
              priority: HIGH
              description: 'Concurrent license usage is above the high threshold for 5 minutes.'
              tags:
                - tag: component
                  value: license
                - tag: scope
                  value: capacity
        - uuid: 832ad468df484a3cb9b158fec3e6b29d
          name: 'Concurrent licenses used'
          type: SNMP_AGENT
