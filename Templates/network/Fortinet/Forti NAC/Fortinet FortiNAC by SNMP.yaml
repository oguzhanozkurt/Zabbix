        - uuid: e140e2e722414f30882a8156fa45f82a
          name: 'Swap free'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.1.10.0'
          key: fortinac.swap.free
          history: 30d
          units: B
          description: 'freeSwap from FortiNAC MIB (kB), converted to bytes.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: swap
        - uuid: 2e4f5ef8543843fa9a7386eff438773a
          name: 'Swap free (%)'
          type: CALCULATED
          key: fortinac.swap.free.pct
          history: 30d
          value_type: FLOAT
          units: '%'
          params: '100*last(//fortinac.swap.free)/last(//fortinac.swap.total)'
          tags:
            - tag: component
              value: swap
          triggers:
            - uuid: 1dbdf5c516254b1e99568125ac895d46
              expression: 'avg(/Fortinet FortiNAC by SNMP/fortinac.swap.free.pct,5m)<{$FORTINAC.SWAP.FREE.MIN}'
              name: 'FortiNAC: Low free swap (< {$FORTINAC.SWAP.FREE.MIN}%)'
              priority: HIGH
              description: 'Average free swap percentage is below the configured threshold for 5 minutes.'
              tags:
                - tag: component
                  value: swap
                - tag: scope
                  value: capacity
        - uuid: c18a096a1dfb4a2eac0baa42345d4067
