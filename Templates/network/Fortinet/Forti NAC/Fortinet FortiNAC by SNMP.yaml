zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 74bffd3469c6475a9a4bbc97c8edcbef
      name: 'Templates/Network devices'
  templates:
    - uuid: 754d3e5dc7184a62b4dfdde63f9be5ef
      template: 'Fortinet FortiNAC by SNMP'
      name: 'Fortinet FortiNAC by SNMP'
      description: |
        FortiNAC SNMP template for Zabbix 7.0 based on the Fortinet FortiNAC MIB reference.
        Includes license, memory, swap, client posture, and device inventory metrics.
        Disk OIDs are present but disabled by default due to Fortinet release notes noting that totalDisk/freeDisk may return 0 on some versions.
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 560758e191eb49978f1fd37560c56f6c
          name: 'At-risk clients offline'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.3.13.0'
          key: fortinac.clients.atrisk.offline
          delay: 5m
          history: 30d
          tags:
            - tag: component
              value: client
        - uuid: e34c9adb867f4f2dbda6dcd843f64640
          name: 'At-risk clients online'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.3.12.0'
          key: fortinac.clients.atrisk.online
          delay: 5m
          history: 30d
          tags:
            - tag: component
              value: client
        - uuid: a66cc9ef63b14aae97cc6a71f71cedfa
          name: 'At-risk clients total'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.3.11.0'
          key: fortinac.clients.atrisk.total
          delay: 2m
          history: 30d
          tags:
            - tag: component
              value: client
          triggers:
            - uuid: 456b1dba63dc459086df8e9832b77a00
              expression: 'max(/Fortinet FortiNAC by SNMP/fortinac.clients.atrisk.total,5m)>{$FORTINAC.ATRISK.MAX}'
              name: 'FortiNAC: At-risk client count is above threshold'
              priority: WARNING
              description: 'FortiNAC reports at-risk clients above the configured threshold.'
              tags:
                - tag: component
                  value: client
                - tag: scope
                  value: security
        - uuid: adee332d56cd4a60b14c16e25e7b275c
          name: 'Disabled clients offline'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.3.10.0'
          key: fortinac.clients.disabled.offline
          delay: 5m
          history: 30d
          tags:
            - tag: component
              value: client
        - uuid: a0d92f73321f414c917fc8770e51781d
          name: 'Disabled clients online'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.3.9.0'
          key: fortinac.clients.disabled.online
          delay: 5m
          history: 30d
          tags:
            - tag: component
              value: client
        - uuid: e6a4bc785dc2457f8e456cf2d04a4b8d
          name: 'Disabled clients total'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.3.8.0'
          key: fortinac.clients.disabled.total
          delay: 2m
          history: 30d
          tags:
            - tag: component
              value: client
          triggers:
            - uuid: 0140ac5d478e4041bd9b726723c2fdba
              expression: 'max(/Fortinet FortiNAC by SNMP/fortinac.clients.disabled.total,5m)>{$FORTINAC.DISABLED.MAX}'
