          triggers:
            - uuid: b5388676ce094f24b4a5941a783516de
              expression: 'avg(/Fortinet FortiNAC by SNMP/fortinac.memory.free.pct,5m)<{$FORTINAC.MEM.FREE.MIN}'
              name: 'FortiNAC: Low free memory (< {$FORTINAC.MEM.FREE.MIN}%)'
              priority: HIGH
              description: 'Average free memory percentage is below the configured threshold for 5 minutes.'
              tags:
                - tag: component
