          name: 'Disk free'
          type: SNMP_AGENT
          snmp_oid: '{$FORTINAC.BASE}.1.4.1.12.0'
          key: fortinac.disk.free
          history: 30d
          status: DISABLED
          units: B
          description: 'Disabled by default because Fortinet release notes mention totalDisk/freeDisk may return 0 on some FortiNAC-F versions.'
