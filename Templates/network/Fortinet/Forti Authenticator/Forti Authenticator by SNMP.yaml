zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: 200b936cb5f14358836c6a749772417c
      template: 'Forti Authenticator by SNMP'
      name: 'Forti Authenticator by SNMP'
      groups:
        - name: Templates/Applications
      items:
        - uuid: b1c0ef42d67549dab70f502e88901b97
          name: 'Auth Events 5 minutes'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.21.0
          key: auth.events.5.min
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: aeb05162ab8441ea89c9339e7b52d040
          name: 'Auth Events Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.20.0
          key: auth.events.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: abef0eaeb77e47b1b94bd3a5c26f2028
          name: 'Auth Failures 5 minutes'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.23.0
          key: auth.failures.5.min
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: bdd4b069aa464f96b17a96b088ff3a43
          name: 'Auth Failures Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.22.0
          key: auth.failures.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 90497aba43d04b35bfff1776e38fd0cc
          name: 'CPU Usage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.12356.113.1.4.0
          key: cpu.usage
          history: 1w
          units: '%'
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: 838b41e68d0f4bdda0370aa44917bf95
              expression: 'min(/Forti Authenticator by SNMP/cpu.usage,15m)>=80'
              name: 'CPU Usage is high for 15 minutes'
              priority: HIGH
              manual_close: 'YES'
        - uuid: fa9620e99576414998f3671c42f1c2f0
          name: 'Forti Token Count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.3.0
          key: forti.token.count
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 003fcbc7a8004510a8cc78c34c864f20
          name: 'Forti Token Remaining'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.6.0
          key: forti.token.remaining
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 728bcda179f84a26aa93c7c7580f34be
          name: 'FSSO User Count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.26.0
          key: fsso.user.count
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: eea47d973ac3423da4ebdae540320870
          name: 'FSSO User Remaining'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.27.0
          key: fsso.user.remaining
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: dab129ca4cba481f9c005ecb3d5a39f7
          name: 'Group Count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.2.0
          key: group.count
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: ffb1c485c813489ca1be83deed48f0cb
          name: 'Group Remaining'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.5.0
          key: group.remaining
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: a5647c5dd54f4ea79c4204ff544fdcdf
          name: 'HA Status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.201.1.0
          key: ha.status
          delay: 5m
          history: 1w
          valuemap:
            name: 'HA Status'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: a34415248890431b956f97b229cc237e
              expression: 'last(/Forti Authenticator by SNMP/ha.status)<>last(/Forti Authenticator by SNMP/ha.status,#2)'
              name: 'HA Status changed'
              priority: HIGH
              manual_close: 'YES'
        - uuid: ac0fba03f42d4ae4badb19ad6b8845e3
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 1w
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: cac024e5b80c42c89997071c2e21a60b
              expression: 'max(/Forti Authenticator by SNMP/icmpping,#3)=0'
              name: 'Unavailable by ICMP ping'
              priority: DISASTER
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
              manual_close: 'YES'
        - uuid: e50ec3c9f41744489ee4e09fe5ed43c5
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          history: 1w
          value_type: FLOAT
          units: '%'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 86c0c5a3b8e344c19d7b38f14a7ab205
              expression: 'min(/Forti Authenticator by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Forti Authenticator by SNMP/icmppingloss,5m)<100'
              name: 'High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Forti Authenticator by SNMP/icmpping,#3)=0'
        - uuid: 1a37c92ff2c74ca4b4cd4391482c3e3c
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          history: 1w
          value_type: FLOAT
          units: s
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 65f1e60c1304436a9cc7aef967b5cc9c
              expression: 'avg(/Forti Authenticator by SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'High ICMP ping loss'
                  expression: 'min(/Forti Authenticator by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Forti Authenticator by SNMP/icmppingloss,5m)<100'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Forti Authenticator by SNMP/icmpping,#3)=0'
        - uuid: ff57abe3c2124f40bf8932cd4d50199b
          name: 'LDAP Failures 5 minutes'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.19.0
          key: ldap.failures.5.min
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: ee6b21f4b4c04651ba7f7fd4d718036c
          name: 'LDAP Failures Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.18.0
          key: LDAP.failures.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 5fcc669bbbb44eacac44c43232a454e7
          name: 'LDAP Logins 5 minutes'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.17.0
          key: ldap.logins.5.min
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 0640fbdcb0ce48e188b10e909a82a407
          name: 'LDAP Logins Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.16.0
          key: ldap.logins.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 6c11b96480d44d0899523feec60aacf6
          name: 'Log Disk Usage'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.6.0
          key: log.disk.usage
          history: 1w
          units: '%'
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: 59b88572f08b4afda766698b35ccb5ca
              expression: 'min(/Forti Authenticator by SNMP/log.disk.usage,15m)>=80'
              name: 'Log Disk Usage is high for 15 minutes'
              priority: HIGH
              manual_close: 'YES'
        - uuid: 291a98de20444a33abe9a68907f2a388
          name: 'Memory Usage'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.5.0
          key: memory.usage
          history: 1w
          units: '%'
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: 14638c6a86a24ff599408d1044fc2f09
              expression: 'min(/Forti Authenticator by SNMP/memory.usage,15m)>=80'
              name: 'Memory Usage is high for 15 minutes'
              priority: HIGH
              manual_close: 'YES'
        - uuid: 1678550dd017440f934ff42a79717a05
          name: 'Radius Accounting 5 minutes'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.15.0
          key: radius.accounting.5.min
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: dc925798c8a14b40b631caf6a0664ef5
          name: 'Radius Accounting Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.14.0
          key: radius.accounting.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: bcfa5fd2254c419182db032559ce2a83
          name: 'Radius Failures 5 minutes'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.13.0
          key: radius.failures.5.min
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: e756f19339864fe2901220f7acc35702
          name: 'Radius Failures Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.12.0
          key: radius.failures.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: ab45a21fcc41405a9f5f42b6f76334a3
          name: 'Radius Logins 5 minutes'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.11.0
          key: radius.logins.5.min
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: b9741ba1b83940839d57741fccf98502
          name: 'Radius Logins Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.10.0
          key: radius.logins.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: c224fded124448c2a0d1abeae86dc88a
          name: 'Radius NAS Count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.7.0
          key: radius.nas.count
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: db033c381dd94c7485f48b2ff59c543e
          name: 'Radius NAS Remaining'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.8.0
          key: radius.nas.remaining
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: d75dd46f01d24a8187bade1eadfab866
          name: 'Radius Proxy In Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.24.0
          key: radius.proxy.in.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 8953eba8582d4aad9c03d0a35f052b4d
          name: 'Radius Proxy Out Total'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.25.0
          key: radius.proxy.out.total
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 9ca4afd62e2a40358badfcbcb47394df
          name: 'RAID Status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.28.0
          key: raid.status
          history: 1w
          valuemap:
            name: 'RAID Status'
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: 392ed3ff1b404c83b39616157a50031c
              expression: 'last(/Forti Authenticator by SNMP/raid.status)=2'
              name: 'RAID Status is Degraded'
              priority: HIGH
              manual_close: 'YES'
            - uuid: e855a376f3dc447dbeb204602d735212
              expression: 'last(/Forti Authenticator by SNMP/raid.status)=3'
              name: 'RAID Status is Failed'
              priority: DISASTER
              manual_close: 'YES'
        - uuid: 48986d0dac424db1b7e0851a1f3c6de9
          name: 'Serial Number'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.2.0
          key: serial.number
          delay: 12h
          history: 1w
          value_type: CHAR
          trends: '0'
          tags:
            - tag: Application
              value: General
        - uuid: 2f67780c0f5645a88b970c31148ddea7
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.4.0
          key: 'system.contact[sysContact.0]'
          delay: 1h
          history: 2w
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person.  If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: Application
              value: General
        - uuid: 2428e21234bf44f7bc4b7df82525747b
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: 'system.descr[sysDescr.0]'
          delay: 1h
          history: 2w
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: Application
              value: General
        - uuid: 5913871deb674d3d849d9c4c0e58964f
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.6.0
          key: 'system.location[sysLocation.0]'
          delay: 1h
          history: 2w
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The physical location of this node (e.g., `telephone closet, 3rd floor').  If the location is unknown, the value is the zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: Application
              value: General
        - uuid: e5f4ea9188364e378c7ceae339f3d80a
          name: 'System Model'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.1.0
          key: system.model
          delay: 12h
          history: 1w
          value_type: CHAR
          trends: '0'
          tags:
            - tag: Application
              value: General
        - uuid: 0916a2d50a6048c1b703f9cd425ab4d7
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 1h
          history: 2w
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name.  If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: 0a194c7cfdc5450b88affd0121081776
              expression: 'last(/Forti Authenticator by SNMP/system.name,#1)<>last(/Forti Authenticator by SNMP/system.name,#2) and length(last(/Forti Authenticator by SNMP/system.name))>0'
              name: 'System name has changed (new name: {ITEM.VALUE})'
              priority: INFO
              description: 'System name has changed. Ack to close.'
              manual_close: 'YES'
        - uuid: d7fefdd556554b53a6cb9747c746fe7e
          name: Uptime
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: 'system.uptime[sysUpTime.0]'
          delay: 30s
          history: 2w
          trends: 0d
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            The time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 958d383862084cb0af572887df499bf0
              expression: 'last(/Forti Authenticator by SNMP/system.uptime[sysUpTime.0])<10m'
              name: '{HOST.NAME} has been restarted (uptime < 10m)'
              priority: HIGH
              description: 'Uptime is less than 10 minutes'
              manual_close: 'YES'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Forti Authenticator by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
        - uuid: dd13afd7bdcf443bbfef3813459b0e41
          name: 'System Version'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.3.0
          key: system.version
          delay: 12h
          history: 1w
          value_type: CHAR
          trends: '0'
          tags:
            - tag: Application
              value: General
        - uuid: 16fe817c204243329d09846c54cba6eb
          name: 'User Certificate Count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.9.0
          key: user.cert.count
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 781df106727a41369200ad613c9498c6
          name: 'Local Users Count'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.1.0
          key: user.count
          history: 1w
          tags:
            - tag: Application
              value: General
        - uuid: 1d3b4d1e8631453c82cc4e91e3fbf4de
          name: 'Local Users Remaining'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.12356.113.1.202.4.0
          key: user.remaining
          history: 1w
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: 267fb957ff5f4011aadbc41332f8767f
              expression: 'last(/Forti Authenticator by SNMP/user.remaining)<{$FAC.USER.REMAIN.WARN}'
              name: 'Local Users Remaining is low (less than {$FAC.USER.REMAIN.WARN})'
              priority: HIGH
              manual_close: 'YES'
            - uuid: e24a992c35524137bf198cdeb33dfa16
              expression: 'last(/Forti Authenticator by SNMP/user.remaining)<{$FAC.USER.REMAIN.HIGH}'
              name: 'Local Users Remaining is too low (less than {$FAC.USER.REMAIN.HIGH})'
              priority: HIGH
              manual_close: 'YES'
        - uuid: cac5eb0bfdb643f0b28645c70fd959bc
          name: 'Local Users Utilization'
          type: CALCULATED
          key: user.utilization
          history: 1w
          params: '100*last(//user.count)/(last(//user.count)+last(//user.remaining))'
          tags:
            - tag: Application
              value: General
        - uuid: 4be896171b8f43ed8519ed2875fe394b
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          history: 7d
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: acd549de40af4729969b3353c061c28e
              expression: 'max(/Forti Authenticator by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: DISASTER
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
              dependencies:
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Forti Authenticator by SNMP/icmpping,#3)=0'
      macros:
        - macro: '{$FAC.USER.REMAIN.HIGH}'
          value: '20'
        - macro: '{$FAC.USER.REMAIN.WARN}'
          value: '40'
        - macro: '{$ICMP_LOSS_WARN}'
          value: '20'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
        - macro: '{$SNMP.TIMEOUT}'
          value: 5m
        - macro: '{$SNMP_COMMUNITY}'
          value: public
      valuemaps:
        - uuid: aab1c32a99b74cec8c52aea09414cf01
          name: 'HA Status'
          mappings:
            - value: '1'
              newvalue: 'Unknown or Determining'
            - value: '2'
              newvalue: 'Cluster Primary'
            - value: '3'
              newvalue: 'Cluster Secondary'
            - value: '4'
              newvalue: 'Standalone Primary'
            - value: '5'
              newvalue: 'Load Balancer'
            - value: '255'
              newvalue: Disabled
        - uuid: 48dc20eb090742cc9c30656b043525aa
          name: 'RAID Status'
          mappings:
            - value: '1'
              newvalue: OK
            - value: '2'
              newvalue: Degraded
            - value: '3'
              newvalue: Failed
            - value: '4'
              newvalue: Initializing
            - value: '5'
              newvalue: Verifying
            - value: '6'
              newvalue: Rebuilding
            - value: '0'
              newvalue: None
