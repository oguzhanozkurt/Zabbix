zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: a3a6bf2a57b040cc93178310e5e8d1f2
    name: Templates/Network devices
  templates:
  - uuid: b6d9f7a6c4c94c2f8c5a0e6c8f4b9a21
    template: Template Ruijie Reyee SNMP Unified
    name: Template Ruijie Reyee SNMP Unified
    description: 'Unified Ruijie Reyee SNMP template for Zabbix 7.0. Combines Base + Standard Health and removes duplicate
      system/entity items. Uses standard SNMP MIBs only: SNMPv2-MIB, IF-MIB, IF-MIB HC counters, HOST-RESOURCES-MIB and ENTITY-MIB.
      Designed for Reyee switches exposing Net-SNMP sysObjectID 1.3.6.1.4.1.8072.3.2.10. Private Ruijie OID tree 1.3.6.1.4.1.4881
      is intentionally not used. HR device status is intentionally excluded because this model exposes interface rows as down,
      causing false positives.'
    groups:
    - name: Templates/Network devices
    items:
    - uuid: 2465b8b41d9640f19eacec07b7f14ab4
      name: Interface count
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.2.1.0
      key: net.if.number
      delay: 5m
      history: 30d
      tags:
      - tag: component
        value: network
    - uuid: 5dd69a8ab9bf46ccba9b9632f22125e9
      name: System description
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.1.0
      key: system.descr
      delay: 1h
      history: 30d
      value_type: CHAR
      trends: '0'
      description: 'SNMPv2-MIB sysDescr. MIB reference: .1.3.6.1.2.1.1.1.0'
      tags:
      - tag: component
        value: system
    - uuid: e7874c2dcd54413ebb1965eced74b935
      name: System location
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.6.0
      key: system.location
      delay: 1h
      history: 30d
      value_type: CHAR
      trends: '0'
      tags:
      - tag: component
        value: system
    - uuid: 7c599f03f6374504856ec2f7ea288640
      name: System name
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.5.0
      key: system.name
      delay: 1h
      history: 30d
      value_type: CHAR
      trends: '0'
      tags:
      - tag: component
        value: system
    - uuid: 3cc5fca1a735441c86a2b49a79602a2d
      name: System object ID
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.2.0
      key: system.objectid
      delay: 1h
      history: 30d
      value_type: CHAR
      trends: '0'
      description: SNMPv2-MIB sysObjectID.
      tags:
      - tag: component
        value: system
    - uuid: 34c70bba00df4e8e96a2a8dc1c6c55a1
      name: System uptime
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.3.0
      key: system.uptime
      history: 30d
      units: uptime
      description: SNMPv2-MIB sysUpTime converted from TimeTicks to seconds.
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '0.01'
      tags:
      - tag: component
        value: system
    - uuid: a485e71f277d4d50a63a3f416cb05dd0
      name: Physical memory total
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.2.2.0
      key: vm.memory.total[hrMemorySize]
      delay: 5m
      history: 30d
      units: B
      description: HOST-RESOURCES-MIB hrMemorySize is reported in KBytes.
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '1024'
      tags:
      - tag: component
        value: memory
    - uuid: 91683775e44f4ebda3fd2ee29c641afe
      name: Running software/process count
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.1.6.0
      key: reyee.hr.processes[hrSystemProcesses]
      delay: 5m
      history: 30d
      trends: 365d
      value_type: UNSIGNED
      tags:
      - tag: component
        value: system
    discovery_rules:
    - uuid: f96080fbe2e14c629890e9bd5e8f6b85
      name: Physical entity discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#ENTINDEX},1.3.6.1.2.1.47.1.1.1.1.1,{#ENTNAME},1.3.6.1.2.1.47.1.1.1.1.7,{#ENTCLASS},1.3.6.1.2.1.47.1.1.1.1.5]
      key: entity.discovery
      delay: 6h
      item_prototypes:
      - uuid: 785aef7ec8cb46148202b48f5681357d
        name: 'Entity {#ENTINDEX}: Class'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.5.{#SNMPINDEX}
        key: entity.class[entPhysicalClass.{#SNMPINDEX}]
        history: 7d
        tags:
        - tag: component
          value: inventory
      - uuid: 963d0c6b28bd43a9a0231de7b0fb61d4
        name: 'Entity {#ENTINDEX}: Description'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.2.{#SNMPINDEX}
        key: entity.descr[entPhysicalDescr.{#SNMPINDEX}]
        history: 7d
        value_type: CHAR
        trends: '0'
        tags:
        - tag: component
          value: inventory
      - uuid: 49b19d9e924240f3809eef5cad65a0d2
        name: 'Entity {#ENTINDEX}: Firmware revision'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.9.{#SNMPINDEX}
        key: entity.fwrev[entPhysicalFirmwareRev.{#SNMPINDEX}]
        history: 7d
        value_type: CHAR
        trends: '0'
        tags:
        - tag: component
          value: inventory
      - uuid: 63a9646ba1f34b73a484f706ab8673da
        name: 'Entity {#ENTINDEX}: Hardware revision'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.8.{#SNMPINDEX}
        key: entity.hwrev[entPhysicalHardwareRev.{#SNMPINDEX}]
        history: 7d
        value_type: CHAR
        trends: '0'
        tags:
        - tag: component
          value: inventory
      - uuid: a2da3303dbb845cb9f949d8cfb697884
        name: 'Entity {#ENTINDEX}: Name'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.7.{#SNMPINDEX}
        key: entity.name[entPhysicalName.{#SNMPINDEX}]
        history: 7d
        value_type: CHAR
        trends: '0'
        tags:
        - tag: component
          value: inventory
      - uuid: 506480f62a7e45e8a11c963df0e83229
        name: 'Entity {#ENTINDEX}: Serial number'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.11.{#SNMPINDEX}
        key: entity.serial[entPhysicalSerialNum.{#SNMPINDEX}]
        history: 7d
        value_type: CHAR
        trends: '0'
        tags:
        - tag: component
          value: inventory
      - uuid: f50db5e119aa4cee81088e7ec10ce0e9
        name: 'Entity {#ENTINDEX}: Software revision'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.10.{#SNMPINDEX}
        key: entity.swrev[entPhysicalSoftwareRev.{#SNMPINDEX}]
        history: 7d
        value_type: CHAR
        trends: '0'
        tags:
        - tag: component
          value: inventory
      - uuid: 6c5ee6a653564d88b168783fce2a5387
        name: 'Entity {#ENTINDEX}: Manufacturer'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.12.{#SNMPINDEX}
        key: entity.mfg[entPhysicalMfgName.{#SNMPINDEX}]
        delay: 1h
        history: 30d
        trends: '0'
        value_type: CHAR
        tags:
        - tag: component
          value: inventory
      - uuid: f8ff5c9c781043d6bf4d49cce066d13a
        name: 'Entity {#ENTINDEX}: Model'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.13.{#SNMPINDEX}
        key: entity.model[entPhysicalModelName.{#SNMPINDEX}]
        delay: 1h
        history: 30d
        trends: '0'
        value_type: CHAR
        tags:
        - tag: component
          value: inventory
      - uuid: e94514f7813c4b6a8e7014b6ec7d482c
        name: 'Entity {#ENTINDEX}: Is FRU'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.16.{#SNMPINDEX}
        key: entity.isfru[entPhysicalIsFRU.{#SNMPINDEX}]
        delay: 1h
        history: 30d
        trends: 365d
        value_type: UNSIGNED
        description: 'ENTITY-MIB entPhysicalIsFRU: true(1), false(2).'
        tags:
        - tag: component
          value: inventory
      trigger_prototypes:
      - uuid: 26043f31ef5c4bd683493bd885e3a10d
        expression: change(/Template Ruijie Reyee SNMP Unified/entity.fwrev[entPhysicalFirmwareRev.{#SNMPINDEX}])=1 and length(last(/Template
          Ruijie Reyee SNMP Unified/entity.fwrev[entPhysicalFirmwareRev.{#SNMPINDEX}]))>0
        name: 'Entity {#ENTINDEX}: Firmware revision changed'
        priority: INFO
      - uuid: 7dbbd7ea8a92479e972bca726cdf1275
        expression: change(/Template Ruijie Reyee SNMP Unified/entity.swrev[entPhysicalSoftwareRev.{#SNMPINDEX}])=1 and length(last(/Template
          Ruijie Reyee SNMP Unified/entity.swrev[entPhysicalSoftwareRev.{#SNMPINDEX}]))>0
        name: 'Entity {#ENTINDEX}: Software revision changed'
        priority: INFO
    - uuid: 260c91e24e9944e2b499ae00cafeb08a
      name: Network interfaces discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#IFINDEX},1.3.6.1.2.1.2.2.1.1,{#IFDESCR},1.3.6.1.2.1.2.2.1.2,{#IFNAME},1.3.6.1.2.1.31.1.1.1.1,{#IFALIAS},1.3.6.1.2.1.31.1.1.1.18,{#IFTYPE},1.3.6.1.2.1.2.2.1.3]
      key: net.if.discovery
      delay: 1h
      item_prototypes:
      - uuid: 5030e28499244c13812da86645b60d12
        name: 'Interface {#IFNAME}: Admin status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.7.{#SNMPINDEX}
        key: net.if.adminstatus[ifAdminStatus.{#SNMPINDEX}]
        history: 7d
        tags:
        - tag: component
          value: network
      - uuid: 2acd1d539acc4f4885a72d22fa948284
        name: 'Interface {#IFNAME}: Alias'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.31.1.1.1.18.{#SNMPINDEX}
        key: net.if.alias[ifAlias.{#SNMPINDEX}]
        history: 7d
        value_type: CHAR
        trends: '0'
        tags:
        - tag: component
          value: network
      - uuid: bfce4018c17e4666a225738c5842218d
        name: 'Interface {#IFNAME}: Description'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.2.{#SNMPINDEX}
        key: net.if.descr[ifDescr.{#SNMPINDEX}]
        history: 7d
        value_type: CHAR
        trends: '0'
        tags:
        - tag: component
          value: network
      - uuid: 987d25199b054dd4a21dfd703188629c
        name: 'Interface {#IFNAME}: Inbound discards'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}
        key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
        history: 7d
        units: pps
        preprocessing:
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        tags:
        - tag: component
          value: network
      - uuid: f79c2366dc6045baad9c6b54ce57cf08
        name: 'Interface {#IFNAME}: Inbound errors'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}
        key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
        history: 7d
        units: pps
        preprocessing:
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        tags:
        - tag: component
          value: network
        trigger_prototypes:
        - uuid: 249955f79501480bbf55c4e91c83e0c2
          expression: min(/Template Ruijie Reyee SNMP Unified/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>0
          name: 'Interface {#IFNAME}: Inbound errors detected'
          priority: WARNING
      - uuid: b074f32334844043a6258c38b0dc7cbb
        name: 'Interface {#IFNAME}: Bits received'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}
        key: net.if.in[ifHCInOctets.{#SNMPINDEX}]
        history: 7d
        units: bps
        preprocessing:
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        - type: MULTIPLIER
          parameters:
          - '8'
        tags:
        - tag: component
          value: network
      - uuid: 17e31d0df347455aaf95eeaa94af573e
        name: 'Interface {#IFNAME}: Operational status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}
        key: net.if.operstatus[ifOperStatus.{#SNMPINDEX}]
        history: 7d
        tags:
        - tag: component
          value: network
      - uuid: 3f0e517f3daa4ce8a7326f370b83ecf8
        name: 'Interface {#IFNAME}: Outbound discards'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.19.{#SNMPINDEX}
        key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
        history: 7d
        units: pps
        preprocessing:
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        tags:
        - tag: component
          value: network
      - uuid: 8c9efeeb466a4cd5b87fd2b17ef3a35c
        name: 'Interface {#IFNAME}: Outbound errors'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}
        key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
        history: 7d
        units: pps
        preprocessing:
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        tags:
        - tag: component
          value: network
        trigger_prototypes:
        - uuid: c59eae960e454b13b057882d2a997724
          expression: min(/Template Ruijie Reyee SNMP Unified/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>0
          name: 'Interface {#IFNAME}: Outbound errors detected'
          priority: WARNING
      - uuid: 1fa1c74c69a7438795546494256fb924
        name: 'Interface {#IFNAME}: Bits sent'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}
        key: net.if.out[ifHCOutOctets.{#SNMPINDEX}]
        history: 7d
        units: bps
        preprocessing:
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        - type: MULTIPLIER
          parameters:
          - '8'
        tags:
        - tag: component
          value: network
      - uuid: cf590685ad3b4ecfbe76955c82e3bbf5
        name: 'Interface {#IFNAME}: Speed'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.31.1.1.1.15.{#SNMPINDEX}
        key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
        history: 7d
        units: bps
        description: IF-MIB ifHighSpeed is reported in Mbit/s; converted to bit/s.
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '1000000'
        tags:
        - tag: component
          value: network
      - uuid: 5ca970bb65c84e92944b4f8508ad4668
        name: 'Interface {#IFNAME}: Type'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.3.{#SNMPINDEX}
        key: net.if.type[ifType.{#SNMPINDEX}]
        history: 7d
        tags:
        - tag: component
          value: network
      trigger_prototypes:
      - uuid: 4edda62b15734a378d439896d3e5147b
        expression: last(/Template Ruijie Reyee SNMP Unified/net.if.operstatus[ifOperStatus.{#SNMPINDEX}])<>1 and last(/Template
          Ruijie Reyee SNMP Unified/net.if.adminstatus[ifAdminStatus.{#SNMPINDEX}])=1
        name: 'Interface {#IFNAME}: Link down'
        priority: AVERAGE
        description: Operational status is not up while administrative status is up.
    - uuid: e4f0b9ed3d2c4ac0ab06c279f71f4f62
      name: HR processor discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#CPU_LOAD},1.3.6.1.2.1.25.3.3.1.2]
      key: reyee.hr.processor.discovery
      delay: 1h
      item_prototypes:
      - uuid: 3d5304d5800d4ec5acfd836d1a91a00d
        name: 'CPU {#SNMPINDEX}: utilization'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.25.3.3.1.2.{#SNMPINDEX}
        key: reyee.cpu.util[hrProcessorLoad.{#SNMPINDEX}]
        delay: 1m
        history: 30d
        trends: 365d
        value_type: UNSIGNED
        units: '%'
        description: HOST-RESOURCES-MIB hrProcessorLoad.
        tags:
        - tag: component
          value: cpu
      trigger_prototypes:
      - uuid: 78b8b42eadf3437c915648cc6ff5dfae
        expression: min(/Template Ruijie Reyee SNMP Unified/reyee.cpu.util[hrProcessorLoad.{#SNMPINDEX}],5m)>{$REYEE.CPU.UTIL.MAX}
        name: 'CPU {#SNMPINDEX}: High utilization'
        priority: WARNING
        description: CPU utilization has been above threshold for 5 minutes.
    - uuid: 93a902ed6ad74a2c8fd6c778e48e3e9d
      name: HR storage discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#STORAGE_DESCR},1.3.6.1.2.1.25.2.3.1.3,{#STORAGE_TYPE},1.3.6.1.2.1.25.2.3.1.2]
      key: reyee.hr.storage.discovery
      delay: 1h
      item_prototypes:
      - uuid: f4a86dbf711b4cfc9303dc5df86b8837
        name: 'Storage {#STORAGE_DESCR}: type'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.25.2.3.1.2.{#SNMPINDEX}
        key: reyee.storage.type[hrStorageType.{#SNMPINDEX}]
        delay: 1h
        history: 30d
        trends: '0'
        value_type: CHAR
        tags:
        - tag: component
          value: storage
      - uuid: 7b73764681c84bc09da18a9b2acf03d3
        name: 'Storage {#STORAGE_DESCR}: allocation unit'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.25.2.3.1.4.{#SNMPINDEX}
        key: reyee.storage.alloc_units[hrStorageAllocationUnits.{#SNMPINDEX}]
        delay: 5m
        history: 30d
        trends: 365d
        value_type: UNSIGNED
        units: B
        tags:
        - tag: component
          value: storage
      - uuid: 51702c4c60d14eb29d3f217dc8a8caae
        name: 'Storage {#STORAGE_DESCR}: size raw'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}
        key: reyee.storage.size.raw[hrStorageSize.{#SNMPINDEX}]
        delay: 5m
        history: 30d
        trends: 365d
        value_type: UNSIGNED
        tags:
        - tag: component
          value: storage
      - uuid: 95316ba69ca342c18ff86ee8f5f49ff0
        name: 'Storage {#STORAGE_DESCR}: used raw'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}
        key: reyee.storage.used.raw[hrStorageUsed.{#SNMPINDEX}]
        delay: 5m
        history: 30d
        trends: 365d
        value_type: UNSIGNED
        tags:
        - tag: component
          value: storage
      - uuid: 9f2044693fb04be2bfcd3d605ae6f6ab
        name: 'Storage {#STORAGE_DESCR}: size'
        type: CALCULATED
        key: reyee.storage.size[hrStorageSize.{#SNMPINDEX}]
        delay: 5m
        history: 30d
        trends: 365d
        value_type: UNSIGNED
        units: B
        params: last(//reyee.storage.size.raw[hrStorageSize.{#SNMPINDEX}])*last(//reyee.storage.alloc_units[hrStorageAllocationUnits.{#SNMPINDEX}])
        tags:
        - tag: component
          value: storage
      - uuid: d51733d69a4642e986c6af2607f21cd2
        name: 'Storage {#STORAGE_DESCR}: used'
        type: CALCULATED
        key: reyee.storage.used[hrStorageUsed.{#SNMPINDEX}]
        delay: 5m
        history: 30d
        trends: 365d
        value_type: UNSIGNED
        units: B
        params: last(//reyee.storage.used.raw[hrStorageUsed.{#SNMPINDEX}])*last(//reyee.storage.alloc_units[hrStorageAllocationUnits.{#SNMPINDEX}])
        tags:
        - tag: component
          value: storage
      - uuid: 4f9847f36e9742bea7c6c591d689b117
        name: 'Storage {#STORAGE_DESCR}: used percentage'
        type: CALCULATED
        key: reyee.storage.used_pct[hrStorageUsedPct.{#SNMPINDEX}]
        delay: 5m
        history: 30d
        trends: 365d
        value_type: FLOAT
        units: '%'
        params: 100*last(//reyee.storage.used.raw[hrStorageUsed.{#SNMPINDEX}])/last(//reyee.storage.size.raw[hrStorageSize.{#SNMPINDEX}])
        tags:
        - tag: component
          value: storage
      trigger_prototypes:
      - uuid: 85cabd1592d949d29f4ac7ab92f52ac4
        expression: min(/Template Ruijie Reyee SNMP Unified/reyee.storage.used_pct[hrStorageUsedPct.{#SNMPINDEX}],10m)>{$REYEE.STORAGE.UTIL.MAX}
        name: 'Storage {#STORAGE_DESCR}: High utilization'
        priority: WARNING
        description: Storage or memory area utilization is above threshold.
      filter:
        evaltype: AND
        conditions:
        - macro: '{#STORAGE_DESCR}'
          value: '{$REYEE.STORAGE.MATCHES}'
          operator: MATCHES_REGEX
        - macro: '{#STORAGE_DESCR}'
          value: '{$REYEE.STORAGE.NOT_MATCHES}'
          operator: NOT_MATCHES_REGEX
    macros:
    - macro: '{$RUIJIE.IF.ERROR.TRIGGER}'
      value: '1'
      description: Reserved macro for interface error trigger tuning.
    - macro: '{$REYEE.CPU.UTIL.MAX}'
      value: '85'
      description: CPU utilization threshold in percent.
    - macro: '{$REYEE.STORAGE.UTIL.MAX}'
      value: '85'
      description: Selected storage/memory utilization threshold in percent.
    - macro: '{$REYEE.STORAGE.MATCHES}'
      value: ^(Physical memory|/tmp|/overlay)$
